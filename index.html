<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGA - Inicio de Sesion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">
        <div class="text-center mb-4">
            <h4 style="color:#003366; font-weight:bold;">Servicio Nacional de Aduanas</h4>
            <p class="text-muted" style="font-size:13px;">Sistema de Gestión Aduanera (SGA)</p>
            <hr>
        </div>

        <h6 class="mb-3">Iniciar Sesión</h6>

        <div class="mb-3">
            <label class="form-label">RUT</label>
            <input type="text" class="form-control" placeholder="Ej: 12.345.678-9" value="16.789.432-K">
        </div>

        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" placeholder="Contraseña" value="12345">
        </div>

        <div class="mb-3">
            <label class="form-label">Perfil de acceso</label>
            <select class="form-select">
                <option value="">Seleccione...</option>
                <option selected>Funcionario Aduanero</option>
                <option>Administrador</option>
                <option>Inspector SAG</option>
                <option>Inspector PDI</option>
                <option>Supervisor</option>
            </select>
        </div>

        <div class="d-grid mt-4">
            <a href="pages/dashboard.html" class="btn btn-aduana">Ingresar al sistema</a>
        </div>

        <p class="text-center text-muted mt-3" style="font-size:11px;">
            Acceso restringido a funcionarios del SNA<br>
            Soporte: mesa.ayuda@aduana.cl
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
